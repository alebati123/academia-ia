<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: #0B0C10; font-family: 'Inter', sans-serif;
      }
      .clip { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; opacity: 0; }
      
      .bg-glow-1, .bg-glow-2 { position: absolute; border-radius: 50%; filter: blur(100px); z-index: 0; }
      .bg-glow-1 { width: 800px; height: 800px; background: rgba(59,130,246,0.4); top: -200px; right: -200px; }
      .bg-glow-2 { width: 600px; height: 600px; background: rgba(139,92,246,0.3); bottom: -100px; left: -100px; }

      .content-wrapper { z-index: 10; text-align: center; }
      
      h1 { font-family: 'Outfit', sans-serif; font-size: 120px; color: #fff; line-height: 1.1; margin-bottom: 20px; text-shadow: 0 0 40px rgba(59,130,246,0.5); }
      .text-blue { color: #3b82f6; }
      
      p.subtitle { font-size: 48px; color: #c0c0c0; max-width: 1200px; }
      
      .badges { display: flex; gap: 40px; }
      .badge { font-family: 'Outfit', sans-serif; font-size: 56px; font-weight: 700; padding: 20px 50px; border-radius: 100px; }
      .badge-green { background: rgba(34,197,94,0.15); color: #22c55e; border: 4px solid #22c55e; }
      .badge-violet { background: rgba(139,92,246,0.15); color: #8b5cf6; border: 4px solid #8b5cf6; }
      .badge-blue { background: rgba(59,130,246,0.15); color: #3b82f6; border: 4px solid #3b82f6; }

      .cta-box { font-family: 'Outfit', sans-serif; font-size: 80px; font-weight: 800; background: #8b5cf6; color: #fff; padding: 30px 80px; border-radius: 100px; box-shadow: 0 20px 50px rgba(139,92,246,0.6); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="10" data-width="1920" data-height="1080">
      
      <!-- Background Track -->
      <div id="bg" class="clip" data-start="0" data-duration="10" data-track-index="0" style="opacity: 1;">
        <div class="bg-glow-1" id="glow1"></div>
        <div class="bg-glow-2" id="glow2"></div>
      </div>

      <!-- Scene 1: Intro (0-4s) -->
      <div id="scene1" class="clip content-wrapper" data-start="0" data-duration="4" data-track-index="1">
        <h1 id="title1">ACADEMIA <span class="text-blue">IA</span></h1>
        <p class="subtitle" id="sub1">Impulsa tu futuro con Inteligencia Artificial</p>
      </div>

      <!-- Scene 2: Features (3.5-7s) -->
      <div id="scene2" class="clip content-wrapper" data-start="3.5" data-duration="3.5" data-track-index="1">
        <div class="badges" id="badges-container">
          <div class="badge badge-green badge-item">Cursos</div>
          <div class="badge badge-blue badge-item">Consultoría</div>
          <div class="badge badge-violet badge-item">Eventos</div>
        </div>
      </div>

      <!-- Scene 3: Outro (6.5-10s) -->
      <div id="scene3" class="clip content-wrapper" data-start="6.5" data-duration="3.5" data-track-index="1">
        <div class="cta-box" id="cta">¡ÚNETE HOY!</div>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Background movement
      tl.to("#glow1", { x: -200, y: 100, duration: 10, ease: "power1.inOut" }, 0);
      tl.to("#glow2", { x: 200, y: -100, duration: 10, ease: "power1.inOut" }, 0);

      // Scene 1
      tl.fromTo("#scene1", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 0);
      tl.from("#title1", { y: 100, opacity: 0, duration: 1, ease: "power3.out" }, 0.2);
      tl.from("#sub1", { y: 50, opacity: 0, duration: 1, ease: "power3.out" }, 0.6);
      tl.to("#scene1", { opacity: 0, y: -50, duration: 0.5 }, 3.5);

      // Scene 2
      tl.fromTo("#scene2", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 3.8);
      tl.from(".badge-item", { scale: 0.5, opacity: 0, y: 50, duration: 0.8, stagger: 0.2, ease: "back.out(1.5)" }, 4.0);
      tl.to("#scene2", { opacity: 0, scale: 1.1, duration: 0.5 }, 6.5);

      // Scene 3
      tl.fromTo("#scene3", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 6.8);
      tl.from("#cta", { scale: 0, rotation: -10, opacity: 0, duration: 1, ease: "elastic.out(1, 0.5)" }, 7.0);
      tl.to("#scene3", { opacity: 0, duration: 0.5 }, 9.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
